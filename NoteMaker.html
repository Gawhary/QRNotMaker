<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Note maker</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- QR decoding library -->
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
    <style>
        /* Custom styles for the Inter font and overall body */
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f0f2f5; /* Light gray background */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            box-sizing: border-box;
        }
        /* Canvas styling */
        canvas {
            border: 2px solid #e2e8f0; /* Light border for the canvas */
            background-color: #ffffff; /* White background for canvas */
            border-radius: 0.5rem; /* Rounded corners */
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1); /* Subtle shadow */
            max-width: 100%; /* Ensure canvas is responsive, but its internal drawing is fixed width */
            height: auto; /* Maintain aspect ratio */
            display: block; /* Remove extra space below canvas */
        }
        /* Hide the default file input button */
        input[type="file"] {
            display: none;
        }
    </style>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen p-4">
    <div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-2xl flex flex-col items-center space-y-6">
        <h1 class="text-3xl font-bold text-gray-800 mb-4 text-center">QR Note Maker</h1>

        <!-- Image Upload Section -->
        <div class="w-full">
            <label for="imageUpload" class="block text-gray-700 text-sm font-semibold mb-2">Add Images:</label>
            <label for="imageUpload" class="cursor-pointer bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded-lg shadow transition duration-300 ease-in-out block text-center">
                Add Images
            </label>
            <input type="file" id="imageUpload" accept="image/*" multiple class="hidden">
        </div>

        <!-- Image Previews -->
        <div id="imagePreviews" class="mt-4 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 w-full">
            <!-- Image previews will be dynamically added here -->
        </div>

        <!-- Text Input Section -->
        <div class="w-full">
            <label for="overlayText" class="block text-gray-700 text-sm font-semibold mb-2">Text to Overlay:</label>
            <textarea id="overlayText" rows="4" class="w-full p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 transition duration-200 ease-in-out">You seem really nice. I'd love to connect for something meaningful, if you're open to it.
            </textarea>

            <!-- Font Size Control -->
            <div class="mt-4">
                <label for="fontSizeSlider" class="block text-gray-700 text-sm font-semibold mb-2">Font Size: <span id="fontSizeValue">240</span>px</label>
                <input type="range" id="fontSizeSlider" min="100" max="500" value="240" class="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer">
            </div>

            <!-- Font Selection Dropdown -->
            <div class="mt-4">
                <label for="fontSelect" class="block text-gray-700 text-sm font-semibold mb-2">Select Font:</label>
                <select id="fontSelect" class="w-full p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 transition duration-200 ease-in-out">
                    <option value="Inter, sans-serif">Inter (Default)</option>
                    <option value="Arial, sans-serif">Arial</option>
                    <option value="Verdana, sans-serif">Verdana</option>
                    <option value="Georgia, serif">Georgia</option>
                    <option value="Times New Roman, serif">Times New Roman</option>
                    <option value="Courier New, monospace">Courier New</option>
                    <option value="Impact, sans-serif">Impact</option>
                    <option value="Comic Sans MS, cursive">Comic Sans MS</option>
                </select>
            </div>

            <!-- QR Placement Option -->
            <div class="mt-4">
                <label for="placementSelect" class="block text-gray-700 text-sm font-semibold mb-2">QR Placement:</label>
                <select id="placementSelect" class="w-full p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 transition duration-200 ease-in-out">
                    <option value="below">Below Text (default)</option>
                    <option value="right">Right of Text (stacked equal rectangles)</option>
                </select>
            </div>

            <!-- Include date/time checkbox -->
            <div class="mt-4 flex items-center space-x-3">
                <input type="checkbox" id="showDateTime" class="h-4 w-4 text-blue-600 focus:ring-blue-500 border-gray-300 rounded">
                <label for="showDateTime" class="text-gray-700 text-sm font-semibold">Include date & time (bottom-right)</label>
            </div>

            <!-- Show captions checkbox -->
            <div class="mt-2 flex items-center space-x-3">
                <input type="checkbox" id="showCaptions" class="h-4 w-4 text-blue-600 focus:ring-blue-500 border-gray-300 rounded" checked>
                <label for="showCaptions" class="text-gray-700 text-sm font-semibold">Show text below each QR</label>
            </div>

         </div>

         <!-- Canvas for Image Combination -->
         <canvas id="imageCanvas" class="w-full h-auto rounded-lg shadow-md"></canvas>

         <!-- Export Button -->
         <button id="exportButton" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-3 px-6 rounded-lg shadow-md transition duration-300 ease-in-out transform hover:scale-105 focus:outline-none focus:ring-2 focus:ring-green-500 focus:ring-opacity-75">
            Export Combined Image
        </button>

        <!-- Message Box for Feedback -->
        <div id="messageBox" class="hidden bg-blue-100 border border-blue-400 text-blue-700 px-4 py-3 rounded-lg relative w-full" role="alert">
            <strong class="font-bold">Info:</strong>
            <span class="block sm:inline" id="messageText"></span>
        </div>
    </div>

    <script>
        const imageUpload = document.getElementById('imageUpload');
        const overlayText = document.getElementById('overlayText');
        const imageCanvas = document.getElementById('imageCanvas');
        const exportButton = document.getElementById('exportButton');
        const imagePreviews = document.getElementById('imagePreviews');
        const messageBox = document.getElementById('messageBox');
        const messageText = document.getElementById('messageText');
        const fontSizeSlider = document.getElementById('fontSizeSlider');
        const fontSizeValueSpan = document.getElementById('fontSizeValue');
        const fontSelect = document.getElementById('fontSelect');
        const placementSelect = document.getElementById('placementSelect');
        const showDateTime = document.getElementById('showDateTime');
        const showCaptions = document.getElementById('showCaptions');
        const ctx = imageCanvas.getContext('2d');

        if (placementSelect) placementSelect.addEventListener('change', drawCanvas);
        if (showDateTime) showDateTime.addEventListener('change', drawCanvas);
        if (showCaptions) showCaptions.addEventListener('change', drawCanvas);
        if (fontSizeSlider) fontSizeSlider.addEventListener('input', drawCanvas);
        if (fontSelect) fontSelect.addEventListener('change', drawCanvas);
        if (overlayText) overlayText.addEventListener('input', drawCanvas);
        
         let loadedImages = []; // Array to store loaded image objects

        // Fixed width for the canvas, simulating a 6cm roll (approx 100px/cm)
        const FIXED_CANVAS_WIDTH = 3600; // Increased resolution
        // Padding for the text at the top and bottom of the text area
        const TEXT_TOP_PADDING = 0; // Kept at 0 as per user's request
        const TEXT_BOTTOM_PADDING = 0; // Kept at 0 as per user's request
        const TEXT_LINE_HEIGHT_FACTOR = 1.1; // Kept at 1.1 as per user's request
        const TEXT_HORIZONTAL_PADDING = 0; // Kept at 0 as per user's request

        // Global defaults to avoid ReferenceError if drawCanvas runs early
        let captionFontSize = 12;
        let captionHeight = 20;

        // Function to show messages to the user
        function showMessage(message, type = 'info') {
            messageText.textContent = message;
            messageBox.classList.remove('hidden');
            messageBox.className = `bg-${type}-100 border border-${type}-400 text-${type}-700 px-4 py-3 rounded-lg relative w-full`;
            setTimeout(() => {
                messageBox.classList.add('hidden');
            }, 5000); // Hide after 5 seconds
        }

        // Function to wrap text based on a maximum width, now respecting newlines
        function wrapText(context, text, maxWidth) {
            const paragraphs = text.split('\n'); // Split by explicit newlines
            let allLines = [];

            if (!text) { // Handle empty text
                return [''];
            }

            paragraphs.forEach(paragraph => {
                const words = paragraph.split(' ');
                let currentLine = '';

                if (words.length === 0 || (words.length === 1 && words[0] === '')) {
                    allLines.push(''); // Preserve empty lines from original newlines
                    return;
                }

                for (let i = 0; i < words.length; i++) {
                    const word = words[i];
                    const testLine = currentLine === '' ? word : currentLine + ' ' + word;
                    const metrics = context.measureText(testLine);
                    const testWidth = metrics.width;

                    if (testWidth > maxWidth && i > 0) {
                        allLines.push(currentLine);
                        currentLine = word;
                    } else {
                        currentLine = testLine;
                    }
                }
                allLines.push(currentLine); // Add the last line of the paragraph
            });
            return allLines;
        }

        // Helper function to render a single image preview
        function renderImagePreview(img) {
            const previewDiv = document.createElement('div');
            // Removed 'group' class as opacity is no longer controlled by hover
            previewDiv.className = 'relative w-full h-32 bg-gray-200 rounded-lg overflow-hidden flex items-center justify-center';
            
            const previewImg = document.createElement('img');
            previewImg.src = img.src;
            previewImg.alt = 'Image preview';
            previewImg.className = 'max-w-full max-h-full object-contain rounded-lg';
            previewDiv.appendChild(previewImg);

            // Create remove button
            const removeButton = document.createElement('button');
            // Removed opacity-0 and group-hover:opacity-100 to make it always visible
            removeButton.className = 'absolute top-1 right-1 bg-red-500 hover:bg-red-700 text-white rounded-full w-6 h-6 flex items-center justify-center text-xs font-bold';
            removeButton.textContent = 'X';
            removeButton.onclick = (event) => {
                event.stopPropagation(); // Prevent click from bubbling up
                removeImage(img);
            };
            previewDiv.appendChild(removeButton);

            imagePreviews.appendChild(previewDiv);
        }

        // Helper: decode QR text from an Image object using jsQR
        function decodeQRFromImage(img) {
            try {
                // create temp canvas sized to image (limit size to avoid huge canvases)
                const maxDim = 2000; // keep decoding canvas reasonable
                const w = img.naturalWidth || img.width;
                const h = img.naturalHeight || img.height;
                let sw = w, sh = h;
                if (w > maxDim || h > maxDim) {
                    const scale = Math.min(maxDim / w, maxDim / h);
                    sw = Math.floor(w * scale);
                    sh = Math.floor(h * scale);
                }
                const temp = document.createElement('canvas');
                temp.width = sw;
                temp.height = sh;
                const tctx = temp.getContext('2d');
                tctx.drawImage(img, 0, 0, sw, sh);
                const imageData = tctx.getImageData(0, 0, sw, sh);
                const code = jsQR(imageData.data, sw, sh);
                if (code && code.data) {
                    img.qrText = code.data;
                } else {
                    img.qrText = img.file && img.file.name ? img.file.name : '';
                }
            } catch (e) {
                img.qrText = img.file && img.file.name ? img.file.name : '';
            }
        }

        // Function to remove an image
        function removeImage(imgToRemove) {
            loadedImages = loadedImages.filter(img => img !== imgToRemove); // Filter out the image
            imagePreviews.innerHTML = ''; // Clear all current previews
            loadedImages.forEach(img => renderImagePreview(img)); // Re-render remaining images
            drawCanvas(); // Redraw canvas
            showMessage('Image removed successfully!', 'info');
        }

        // Function to add an image (from file)
        function addImageToCanvas(img) {
            // No hard limit: allow more than 3 images (QR layout will handle multiple images when placed on the right)
            // decode QR text into img.qrText, then store
            decodeQRFromImage(img);
            loadedImages.push(img);
             renderImagePreview(img); // Render the new image preview
             drawCanvas(); // Redraw canvas with new image
             return true; // Indicate success
         }

         // Function to draw images and text on the canvas
         function drawCanvas() {
            // Get current font size from slider
            const currentFontSize = parseInt(fontSizeSlider.value);
            fontSizeValueSpan.textContent = currentFontSize; // Update displayed value

            // Get current font family from dropdown
            const selectedFontFamily = fontSelect.value;
            const placement = placementSelect ? placementSelect.value : 'below';

            // Set fixed canvas width
            imageCanvas.width = FIXED_CANVAS_WIDTH;

            // Set font for text measurement using the current font size and family
            const TEXT_FONT_STYLE = `bold ${currentFontSize}px ${selectedFontFamily}`;
            ctx.font = TEXT_FONT_STYLE;

            const textToDraw = overlayText.value.trim();
            const lineHeight = currentFontSize * TEXT_LINE_HEIGHT_FACTOR;

            // caption size under each QR image
            const captionFontSizeBase = Math.max(12, Math.floor(currentFontSize * 0.12));
            // captionHeight for below-layout will be computed based on per-image width later
 
             // When QRs are to the right, reserve a right column and wrap text to the left column.
             let leftColumnWidth = FIXED_CANVAS_WIDTH;
             let qrColumnWidth = 0;
             if (placement === 'right' && loadedImages.length > 0) {
                 // Make QR column width equal to the text box width by splitting canvas into two equal columns
                 leftColumnWidth = Math.floor(FIXED_CANVAS_WIDTH / 2);
                 qrColumnWidth = FIXED_CANVAS_WIDTH - leftColumnWidth;
             }

            const maxTextWidth = leftColumnWidth - (2 * TEXT_HORIZONTAL_PADDING);
            const textLines = wrapText(ctx, textToDraw, Math.max(10, maxTextWidth));
            const totalTextHeight = (textLines.length * lineHeight);
            const totalTextSectionHeight = totalTextHeight + TEXT_TOP_PADDING + TEXT_BOTTOM_PADDING;

            // Determine images region height depending on placement
            let totalImagesHeight = 0;
            if (placement === 'right' && loadedImages.length > 0) {
                // Make QR column height equal to text section so each QR rectangle aligns with text folds
                totalImagesHeight = totalTextSectionHeight;
            } else {
                // original behavior: images determine height below text
                if (loadedImages.length > 0) {
                    const targetImageWidthPerImage = FIXED_CANVAS_WIDTH / loadedImages.length;
                    let maxScaledImageHeight = 0;
                    // compute max image height when scaled to target width
                    loadedImages.forEach(img => {
                        const imgW = img.naturalWidth || img.width;
                        const imgH = img.naturalHeight || img.height;
                        const scaledWidth = targetImageWidthPerImage;
                        const scaledHeight = Math.floor(scaledWidth * (imgH / imgW));
                        if (scaledHeight > maxScaledImageHeight) maxScaledImageHeight = scaledHeight;
                    });
                    // if captions enabled, compute maximum caption height across images (based on wrapped lines)
                    let maxCaptionHeight = 0;
                    if (showCaptions && showCaptions.checked) {
                        loadedImages.forEach(img => {
                            const drawW = targetImageWidthPerImage;
                            const captionFontBelow = Math.max(10, Math.floor(drawW * 0.06));
                            ctx.font = `normal ${captionFontBelow}px ${selectedFontFamily}`;
                            const captionText = img.qrText || '';
                            const captionMaxWidth = Math.max(10, Math.floor(drawW - 8));
                            const lines = wrapText(ctx, captionText, captionMaxWidth);
                            const captionHeightForImg = Math.ceil(lines.length * captionFontBelow * 1.1) + 4;
                            if (captionHeightForImg > maxCaptionHeight) maxCaptionHeight = captionHeightForImg;
                        });
                    }
                    totalImagesHeight = maxScaledImageHeight + maxCaptionHeight;
                 }
             }

            // Precompute right-column caption band height and total extra caption area
            let extraCaptionPerRow = 0;
            let captionRows = 0;
            if (placement === 'right' && loadedImages.length > 0 && showCaptions && showCaptions.checked) {
                captionRows = Math.min(2, loadedImages.length);
                const columnsPreview = Math.ceil(loadedImages.length / captionRows);
                const cellWidthPreview = Math.floor((qrColumnWidth || Math.floor(FIXED_CANVAS_WIDTH/2)) / columnsPreview);
                loadedImages.forEach(img => {
                    const cellCaptionFont = Math.max(10, Math.floor(cellWidthPreview * 0.06));
                    ctx.font = `normal ${cellCaptionFont}px ${selectedFontFamily}`;
                    const capMaxWidth = Math.max(10, cellWidthPreview - 8);
                    const lines = wrapText(ctx, img.qrText || '', capMaxWidth);
                    const h = Math.ceil(lines.length * cellCaptionFont * 1.1) + 4;
                    if (h > extraCaptionPerRow) extraCaptionPerRow = h;
                });
            }

            // Set canvas height accordingly
            // Reserve space for optional date/time below the content
            const datePadding = 0; // distance from edges for date text
            const dateFontSize = (currentFontSize * 0.4); // small proportional font for date
            const dateAreaHeight = (showDateTime && showDateTime.checked) ? (dateFontSize + datePadding) : 0;

            // Small extra spacing between content and footer (date/time)
            const FOOTER_SPACING = 12; // pixels

            // Include extra caption area for right placement
            const extraCaptionTotal = (placement === 'right' ? (extraCaptionPerRow * captionRows) : 0);
            imageCanvas.height = totalTextSectionHeight + (placement === 'below' ? totalImagesHeight : 0) + extraCaptionTotal + dateAreaHeight + FOOTER_SPACING;

            // Clear the canvas before redrawing
            ctx.clearRect(0, 0, imageCanvas.width, imageCanvas.height);
            // Fill background of the canvas with white
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, imageCanvas.width, imageCanvas.height);

            // Draw the overlay text
            ctx.font = TEXT_FONT_STYLE; // Ensure font is set again before drawing
            ctx.fillStyle = 'black'; // Darker text color
            ctx.textBaseline = 'top'; // Align text to the top of the line
            if (placement === 'right' && loadedImages.length > 0) {
                // Left column, center text within left column
                ctx.textAlign = 'center';
                const leftTextX = Math.floor(leftColumnWidth / 2);
                let currentTextY = TEXT_TOP_PADDING;
                textLines.forEach(line => {
                    ctx.fillText(line, leftTextX, currentTextY);
                    currentTextY += lineHeight;
                });
            } else {
                // Default: centered across full width
                ctx.textAlign = 'center';
                let currentTextY = TEXT_TOP_PADDING;
                textLines.forEach(line => {
                    ctx.fillText(line, imageCanvas.width / 2, currentTextY);
                    currentTextY += lineHeight;
                });
            }

            // Draw images (QRs) depending on placement
            if (placement === 'right' && loadedImages.length > 0) {
                // Draw QR column at right: arrange into grid with max 2 rows
                const rows = Math.min(2, loadedImages.length);
                const columns = Math.ceil(loadedImages.length / rows);
                const cellWidth = Math.floor(qrColumnWidth / columns);
                // compute base cell height from text section and add per-row caption reserve so captions sit inside each cell
                const baseCellHeight = Math.max(1, Math.floor(totalTextSectionHeight / rows));
                const captionReservePerRow = extraCaptionPerRow; // previously computed
                const cellHeight = Math.max(1, baseCellHeight + captionReservePerRow);
                 // draw each image in grid: top row first, left to right, then bottom row
                 loadedImages.forEach((img, i) => {
                     const row = Math.floor(i / columns);
                     const col = i % columns;
                     const rectX = leftColumnWidth + col * cellWidth;
                     const rectY = row * cellHeight;
                     // reserve bottom area inside the cell for caption
                     const imageAreaHeight = Math.max(1, cellHeight - captionReservePerRow);
                     // compute scale to fit inside cellWidth x imageAreaHeight while preserving aspect ratio
                     // use natural dimensions for better scaling
                     const imgW = img.naturalWidth || img.width;
                     const imgH = img.naturalHeight || img.height;
                     const scale = Math.min(cellWidth / imgW, imageAreaHeight / imgH);
                     let drawWidth = Math.max(1, Math.floor(imgW * scale));
                     let drawHeight = Math.max(1, Math.floor(imgH * scale));
                     // center in cell
                     const drawX = rectX + Math.floor((cellWidth - drawWidth) / 2);
                     const drawY = rectY + Math.floor((imageAreaHeight - drawHeight) / 2);
                     ctx.drawImage(img, drawX, drawY, drawWidth, drawHeight);
                     // draw caption if enabled
                     if (showCaptions && showCaptions.checked) {
                         const cellCaptionFont = Math.max(10, Math.floor(cellWidth * 0.06));
                         ctx.font = `normal ${cellCaptionFont}px ${selectedFontFamily}`;
                         ctx.fillStyle = 'black';
                         ctx.textAlign = 'center';
                         ctx.textBaseline = 'top';
                         const captionText = img.qrText || '';
                         const captionX = rectX + Math.floor(cellWidth / 2);
                         // caption sits inside this cell just below its image
                         const captionY = rectY + imageAreaHeight + 2;
                         // wrap caption to fit caption area width
                         const captionMaxWidth = Math.max(10, cellWidth - 8);
                         const captionLines = wrapText(ctx, captionText, captionMaxWidth);
                         const captionLineHeight = cellCaptionFont * 1.1;
                         for (let li = 0; li < captionLines.length; li++) {
                             ctx.fillText(captionLines[li], captionX, captionY + li * captionLineHeight);
                         }
                     }
                     // faint rectangle border to show fold lines
                     ctx.strokeStyle = 'rgba(0,0,0,0.06)';
                     ctx.strokeRect(rectX, rectY, cellWidth, cellHeight);
                });
            } else {
                 // original behavior: images laid out side-by-side under text
                 let currentImageX = 0;
                 const imagesYStart = totalTextSectionHeight; // Y position where images start
                 if (loadedImages.length > 0) {
                     const targetImageWidthPerImage = FIXED_CANVAS_WIDTH / loadedImages.length;
                     loadedImages.forEach(img => {
                         const aspectRatio = img.width / img.height;
                         const imgW = img.naturalWidth || img.width;
                         const imgH = img.naturalHeight || img.height;
                         const targetW = targetImageWidthPerImage;
                         const scale = Math.min(targetW / imgW, targetW / imgW);
                         const drawWidth = Math.max(1, Math.floor(imgW * scale));
                         const drawHeight = Math.max(1, Math.floor(imgH * scale));
                         const imageDrawHeight = drawHeight;
                         ctx.drawImage(img, currentImageX, imagesYStart, drawWidth, imageDrawHeight);
                         // draw caption below images if enabled
                         if (showCaptions && showCaptions.checked) {
                             const captionFontBelow = Math.max(10, Math.floor(drawWidth * 0.06));
                             ctx.font = `normal ${captionFontBelow}px ${selectedFontFamily}`;
                             ctx.fillStyle = 'black';
                             ctx.textAlign = 'center';
                             ctx.textBaseline = 'top';
                             const captionText = img.qrText || '';
                             const captionX = currentImageX + Math.floor(drawWidth / 2);
                             const captionY = imagesYStart + imageDrawHeight + 2;
                             const captionMaxWidthBelow = Math.max(10, Math.floor(drawWidth - 8));
                             const captionLinesBelow = wrapText(ctx, captionText, captionMaxWidthBelow);
                             const captionLineHeight = captionFontBelow * 1.1;
                             for (let li = 0; li < captionLinesBelow.length; li++) {
                                 ctx.fillText(captionLinesBelow[li], captionX, captionY + li * captionLineHeight);
                             }
                         }
                         currentImageX += drawWidth;
                     });
                 }

            }

            // Optionally draw the date/time text at the bottom-right
            if (showDateTime && showDateTime.checked) {
                ctx.font = `normal ${dateFontSize}px ${selectedFontFamily}`;
                ctx.fillStyle = 'black';
                ctx.textAlign = 'right';
                ctx.textBaseline = 'top';
                const dateText = new Date().toLocaleString(); // Local date/time
                const dateX = imageCanvas.width - datePadding;
                const dateY = imageCanvas.height - datePadding - dateAreaHeight;
                ctx.fillText(dateText, dateX, dateY);
            }
        }

        // Initial message to user
        showMessage('Welcome to QR Note Maker! Add images and customize your note.', 'info');

        // Handle image file selection
        imageUpload.addEventListener('change', (event) => {
            const files = Array.from(event.target.files);
            const imageFiles = files.filter(file => file.type.startsWith('image/'));
            if (imageFiles.length === 0) {
                showMessage('No valid image files selected. Please try again.', 'error');
                return;
            }
            // Read and load each image file and append to existing loadedImages
            const promises = imageFiles.map(file => {
                return new Promise((resolve, reject) => {
                    const img = new Image();
                    img.src = URL.createObjectURL(file);
                    img.file = file; // Store the original file reference
                    img.onload = () => resolve(img);
                    img.onerror = (e) => reject(e);
                });
            });
            Promise.all(promises).then(newImgs => {
                // append and render each new image
                newImgs.forEach(img => {
                    try { decodeQRFromImage(img); } catch(e) { img.qrText = img.file && img.file.name ? img.file.name : ''; }
                    loadedImages.push(img);
                    renderImagePreview(img);
                });
                drawCanvas();
                showMessage(`${newImgs.length} image(s) added. Total: ${loadedImages.length}`, 'info');
            }).catch(err => {
                console.error('Error loading images:', err);
                showMessage('Error loading images. Please try again.', 'error');
            });
        });

        // Handle export button click
        exportButton.addEventListener('click', () => {
            // Temporarily hide the message box if visible
            const wasMessageBoxVisible = !messageBox.classList.contains('hidden');
            if (wasMessageBoxVisible) {
                messageBox.classList.add('hidden');
            }

            // Convert the canvas to a data URL (PNG format)
            const imageData = imageCanvas.toDataURL('image/png');
            const link = document.createElement('a');
            link.href = imageData;
            link.download = 'qr_note.png';
            // Trigger the download by programmatically clicking the link
            link.click();

            // Clean up and show success message
            link.remove();
            setTimeout(() => {
                // Show the message box again if it was visible before
                if (wasMessageBoxVisible) {
                    messageBox.classList.remove('hidden');
                }
                showMessage('Image exported successfully!', 'info');
            }, 100);
        });

        // Initial canvas draw
        drawCanvas();
    </script>
